name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coinbase_futures_bot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coinbase_futures_bot_test
      RAILS_ENV: test
      # Test credentials (safe for public repo)
      POSITIONS_UI_USERNAME: admin
      POSITIONS_UI_PASSWORD: password123
      # Fake API keys for testing (prevent real API calls)
      SLACK_BOT_TOKEN: xoxb-test-token-fake
      SLACK_VERIFICATION_TOKEN: test-verification-token-fake
      SLACK_AUTHORIZED_USERS: U1234567890
      COINBASE_API_KEY: test-api-key
      COINBASE_API_SECRET: test-api-secret
      CRYPTOPANIC_API_KEY: test-cryptopanic-key
      SENTRY_DSN: ""

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.2'
        bundler-cache: true
    
    - name: Set up database
      run: |
        bundle exec rails db:create db:schema:load
    
    - name: Run StandardRB (linting)
      run: bundle exec standardrb --format github
    
    - name: Run Brakeman (security)
      run: bundle exec brakeman --format github
    
    - name: Run RSpec tests
      run: |
        bundle exec rspec \
          --format progress \
          --format RspecJunitFormatter \
          --out tmp/test-results.xml \
          --format documentation \
          --out tmp/test-output.txt
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          tmp/test-results.xml
          tmp/test-output.txt