name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Rails tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      RAILS_SKIP_DB_PREPARE: '1'
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/coinbase_futures_bot_test

    steps:
      - uses: actions/checkout@v5

      - name: Cache PostgreSQL data
        uses: actions/cache@v4
        with:
          path: ~/.postgresql
          key: ${{ runner.os }}-postgresql-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-postgresql-

      - name: Cache system dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/apt
            ~/.cache/pip
          key: ${{ runner.os }}-system-deps-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-system-deps-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev pkg-config

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Create cache directories
        run: |
          mkdir -p coverage/
          mkdir -p tmp/cache/
          mkdir -p log/

      - name: Cache database setup
        uses: actions/cache@v4
        with:
          path: |
            tmp/
            log/
          key: ${{ runner.os }}-db-${{ hashFiles('**/Gemfile.lock') }}-${{ hashFiles('db/**/*') }}
          restore-keys: |
            ${{ runner.os }}-db-${{ hashFiles('**/Gemfile.lock') }}-
            ${{ runner.os }}-db-

      - name: Prepare database (create + migrate)
        run: bin/rails db:create db:migrate

      - name: Run tests
        run: bundle exec rspec
        env:
          # Enable parallel test execution hints
          PARALLEL_TEST_PROCESSORS: 2

      - name: Cache RSpec results
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            coverage/
            tmp/cache/
            .rspec_status
          key: ${{ runner.os }}-rspec-${{ hashFiles('**/Gemfile.lock') }}-${{ hashFiles('spec/**/*') }}
          restore-keys: |
            ${{ runner.os }}-rspec-${{ hashFiles('**/Gemfile.lock') }}-
            ${{ runner.os }}-rspec-
