name: CI

on:
  pull_request:
    branches: [ main, feat/** ]
  push:
    branches: [ main ]

env:
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/coinbase_futures_bot_test
  COVERAGE: true

jobs:
  lint:
    name: StandardRB (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: '.ruby-version'
          bundler-cache: true

      - name: Lint code
        run: bin/standardrb

  security:
    name: Brakeman (security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: '.ruby-version'
          bundler-cache: true

      - name: Static security scan
        run: bin/brakeman --no-pager

  test:
    name: Rails tests with coverage
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch full history for diff comparison

      - name: Find changed files and test files
        id: changed-files
        run: |
          echo "=== FINDING CHANGED FILES AND TEST FILES ==="

          # Get the base branch (main or the target branch)
          BASE_BRANCH=${GITHUB_BASE_REF:-main}
          echo "Base branch: $BASE_BRANCH"

          # Run the script to find changed files and test files
          CHANGED_FILES_INFO=$(ruby scripts/get_changed_test_files.rb $BASE_BRANCH)
          echo "Changed files info: $CHANGED_FILES_INFO"

          # Parse JSON and set outputs
          TEST_FILES=$(echo "$CHANGED_FILES_INFO" | ruby -rjson -e "puts JSON.parse(STDIN.read)['test_files'].join(' ')")
          HAS_TEST_FILES=$(echo "$CHANGED_FILES_INFO" | ruby -rjson -e "puts JSON.parse(STDIN.read)['has_test_files']")
          HAS_CHANGES=$(echo "$CHANGED_FILES_INFO" | ruby -rjson -e "puts JSON.parse(STDIN.read)['has_changes']")

          echo "Test files to run: $TEST_FILES"
          echo "Has test files: $HAS_TEST_FILES"
          echo "Has changes: $HAS_CHANGES"

          # Set outputs
          echo "test-files=$TEST_FILES" >> $GITHUB_OUTPUT
          echo "has-test-files=$HAS_TEST_FILES" >> $GITHUB_OUTPUT
          echo "has-changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: '.ruby-version'
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev pkg-config postgresql-client

      - name: Cache test database and artifacts
        uses: actions/cache@v4
        with:
          path: |
            tmp/
            .rspec_status
            spec/fixtures/vcr_cassettes/
          key: ${{ runner.os }}-test-cache-${{ hashFiles('db/**/*', 'spec/**/*', 'Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-cache-${{ hashFiles('Gemfile.lock') }}
            ${{ runner.os }}-test-cache-

      - name: Prepare database (create + migrate)
        run: |
          echo "Waiting for PostgreSQL service to be ready..."
          # Wait for PostgreSQL to be fully ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "PostgreSQL not ready yet, waiting..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

          # Ensure proper database setup for real testing
          bin/rails db:create
          bin/rails db:migrate
          bin/rails db:test:prepare
          echo "Database setup complete"

      - name: Debug environment
        run: |
          echo "=== WORKFLOW CACHE TEST - If you see this, cache is refreshed! ==="
          echo "Current timestamp: $(date +%s)"
          echo "Workflow file hash: $(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          echo "=== Environment Debug Info ==="
          echo "RAILS_ENV: $RAILS_ENV"
          echo "DATABASE_URL: $DATABASE_URL"
          echo "COVERAGE: $COVERAGE"
          echo "BUNDLE_GEMFILE: $BUNDLE_GEMFILE"
          echo "GEM_HOME: $GEM_HOME"
          echo "PATH: $PATH"
          echo "Current working directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Rails version:"
          bin/rails --version
          echo "Database status:"
          bin/rails db:version
          echo "=== End Environment Debug ==="

      - name: Run tests with coverage
        timeout-minutes: 15
        env:
          # Force single-process execution - disable parallel testing
          PARALLEL_TESTS: "0"
          PARALLEL_TEST_PROCESSES: "1"
          # Disable test profiling and acceleration
          SAMPLE: ""
          RPROF: ""
          STACKPROF: ""
          TAG_PROF: ""
          # Force real test execution
          FORCE_REAL_TESTS: "true"
          # Disable any caching
          RAILS_CACHE_ID: "ci-$(date +%s)"
          # Use VCR cassettes in CI but ensure real database testing
          VCR_RECORD_MODE: none
          CI: true
          COVERAGE: true  # Enable SimpleCov for coverage reporting
        run: |
          # Disable 'exit on error' for this block; we'll control exit codes manually
          set +e
          echo "=== STARTING TEST SUITE WITH COVERAGE ==="
          echo "Database URL: $DATABASE_URL"
          echo "Rails env: $RAILS_ENV"
          echo "Coverage enabled: $COVERAGE"
          echo "Current directory: $(pwd)"
          echo "Ruby version: $(ruby --version)"
          echo "Bundle version: $(bundle --version)"

          # Force fresh database setup - no caching shortcuts
          echo "=== FORCING FRESH TEST ENVIRONMENT ==="
          bin/rails db:drop db:create db:migrate RAILS_ENV=test

          # Verify test environment
          echo "=== TEST ENVIRONMENT VERIFICATION ==="
          echo "Test files found: $(find spec -name '*_spec.rb' | wc -l)"
          echo "Parallel tests disabled: $PARALLEL_TESTS"
          echo "Test processes: $PARALLEL_TEST_PROCESSES"
          echo "Test profiling disabled: $SAMPLE$RPROF$STACKPROF$TAG_PROF"

          # Verify database connectivity with real operations
          echo "=== VERIFYING REAL DATABASE OPERATIONS ==="
          bin/rails runner "puts 'Database: ' + ActiveRecord::Base.connection.current_database"
          bin/rails runner "puts 'Tables: ' + ActiveRecord::Base.connection.tables.join(', ')"

          # Test real database operations
          echo "=== TESTING REAL DATABASE OPERATIONS ==="
          bin/rails runner "
            begin
              # Create a test record
              test_pos = Position.create!(
                product_id: 'CI-VERIFY-TEST',
                side: 'LONG',
                size: 1.0,
                entry_price: 100.0,
                entry_time: Time.current,
                status: 'OPEN',
                day_trading: true
              )
              puts '✅ Real Position creation verified (ID: ' + test_pos.id.to_s + ')'

              # Verify it exists
              found = Position.find_by(product_id: 'CI-VERIFY-TEST')
              puts '✅ Real Position retrieval verified: ' + (found ? 'SUCCESS' : 'FAILED')

              # Clean up
              test_pos.destroy
              puts '✅ Real Position deletion verified'
            rescue => e
              puts '❌ Real database operations failed: ' + e.message
              exit 1
            end
          "

          # Run changed file tests first for fast feedback
          if [ "${{ steps.changed-files.outputs.has-test-files }}" == "true" ]; then
            echo "=== RUNNING CHANGED FILE TESTS FIRST ==="
            echo "Test files: ${{ steps.changed-files.outputs.test-files }}"
            echo "🧪 CHANGED FILES STARTING: $(date)"

            # Run tests for changed files only (without coverage for speed)
            bundle exec rspec ${{ steps.changed-files.outputs.test-files }} \
              --format documentation \
              --format progress \
              --backtrace \
              --order random \
              --seed $(date +%s)

            CHANGED_FILES_EXIT_CODE=$?
            echo "🧪 CHANGED FILES FINISHED: $(date)"
            echo "Changed files test exit code: $CHANGED_FILES_EXIT_CODE"

            if [ $CHANGED_FILES_EXIT_CODE -ne 0 ]; then
              echo "❌ Changed file tests failed - stopping here for fast feedback"
              exit $CHANGED_FILES_EXIT_CODE
            else
              echo "✅ Changed file tests passed - proceeding with full test suite"
            fi
          else
            echo "=== NO CHANGED FILE TESTS TO RUN ==="
            echo "Changed files don't have corresponding test files or no changes detected."
          fi

          # Run tests with coverage enabled
          echo "=== RUNNING FULL TEST SUITE WITH COVERAGE ==="
          echo "🧪 FULL SUITE STARTING: $(date)"

          # Run RSpec with coverage - SimpleCov will be loaded via spec_helper.rb
          bundle exec rspec \
            --format documentation \
            --format progress \
            --backtrace \
            --order random \
            --seed $(date +%s)

          TEST_EXIT_CODE=$?
          echo "🧪 FINISHED: $(date)"

          echo "=== TEST RESULTS ==="
          echo "Test exit code: $TEST_EXIT_CODE"
          echo "Tests completed"

          # Check for coverage files
          echo "=== CHECKING COVERAGE FILES ==="
          if [ -f "coverage/.resultset.json" ]; then
            echo "✅ Coverage file generated: coverage/.resultset.json"
            echo "Coverage file size: $(ls -lh coverage/.resultset.json | awk '{print $5}')"
          else
            echo "❌ Coverage file not found"
          fi

          if [ -f "coverage/index.html" ]; then
            echo "✅ HTML coverage report generated: coverage/index.html"
          else
            echo "❌ HTML coverage report not found"
          fi

          # Check for background processes
          echo "=== CHECKING FOR BACKGROUND PROCESSES ==="
          set +x
          ps aux | grep ruby || echo "No Ruby processes found"

          # Check for database connections
          echo "=== CHECKING FOR DATABASE CONNECTIONS ==="
          bin/rails runner "puts ActiveRecord::Base.connection_pool.stat"

          # Check for file descriptors
          echo "=== CHECKING FOR FILE DESCRIPTORS ==="
          lsof -p $$ 2>/dev/null | wc -l || echo "lsof not available"

          # Check for errors in test output
          echo "=== CHECKING FOR ERRORS IN TEST OUTPUT ==="
          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "✅ Tests passed successfully"
          else
            echo "❌ Tests failed with exit code $TEST_EXIT_CODE"
          fi

          # Exit with test result code
          exit $TEST_EXIT_CODE

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            coverage/
            coverage/.resultset.json
            coverage/index.html
          retention-days: 30

      - name: Check coverage thresholds
        if: success()
        run: |
          echo "=== COVERAGE THRESHOLD CHECK ==="

          if [ -f "coverage/.resultset.json" ]; then
            echo "Coverage data found, checking thresholds..."

            # Extract line coverage percentage from JSON
            LINE_COVERAGE=$(ruby -rjson -e "
              data = JSON.parse(File.read('coverage/.resultset.json'))
              if data['RSpec'] && data['RSpec']['coverage']
                line_coverage = data['RSpec']['coverage'].values.map { |v| v['lines'] }.flatten.compact
                covered = line_coverage.count { |v| v && v > 0 }
                total = line_coverage.count { |v| v }
                percentage = total > 0 ? (covered.to_f / total * 100).round(2) : 0
                puts percentage
              else
                puts '0'
              end
            ")

            # Extract branch coverage percentage from JSON (handle different structure)
            BRANCH_COVERAGE=$(ruby -rjson -e "
              data = JSON.parse(File.read('coverage/.resultset.json'))
              if data['RSpec'] && data['RSpec']['coverage']
                # Branch coverage structure is different - it's nested under each file
                total_branches = 0
                covered_branches = 0

                data['RSpec']['coverage'].each do |file_path, coverage_data|
                  if coverage_data['branches']
                    coverage_data['branches'].each do |branch_id, branch_data|
                      total_branches += 1
                      if branch_data && branch_data.is_a?(Array) && branch_data.any? { |v| v && v > 0 }
                        covered_branches += 1
                      end
                    end
                  end
                end

                percentage = total_branches > 0 ? (covered_branches.to_f / total_branches * 100).round(2) : 0
                puts percentage
              else
                puts '0'
              end
            ")

            echo "Line coverage: ${LINE_COVERAGE}% (threshold: 50%)"
            echo "Branch coverage: ${BRANCH_COVERAGE}% (threshold: 25%)"

            # Check if thresholds are met (using realistic thresholds for current coverage)
            if (( $(echo "$LINE_COVERAGE >= 50" | bc -l) )); then
              echo "✅ Line coverage threshold met"
            else
              echo "⚠️  Line coverage below threshold (50%) - Consider improving test coverage"
              # Don't fail the build, just warn
            fi

            if (( $(echo "$BRANCH_COVERAGE >= 25" | bc -l) )); then
              echo "✅ Branch coverage threshold met"
            else
              echo "⚠️  Branch coverage below threshold (25%) - Consider improving test coverage"
              # Don't fail the build, just warn
            fi

            echo "📊 Coverage report generated successfully!"
            echo "💡 To improve coverage:"
            echo "   - Add tests for untested methods and branches"
            echo "   - Use SimpleCov locally: rake coverage:run"
            echo "   - Review coverage report: coverage/index.html"
          else
            echo "❌ Coverage data not found"
            exit 1
          fi

  # Coverage badge generation - runs at the end of successful CI
  coverage-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: always() && needs.lint.result == 'success' && needs.security.result == 'success' && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports-${{ github.run_number }}
          path: coverage/
        continue-on-error: true

      - name: Configure Git
        run: |
          git config --global user.email "eric@skeyelab.com"
          git config --global user.name "GitHub Actions Bot"

      - name: Checkout to branch
        run: |
          # Get the current branch name from the PR or push event
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          # Checkout to the actual branch instead of detached HEAD
          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"
          echo "Checked out to branch: $BRANCH_NAME"

      - name: Generate coverage badge
        run: |
          echo "=== COVERAGE BADGE GENERATION ==="
          echo "Looking for coverage data in: coverage/coverage.json"

          if [ -f "coverage/coverage.json" ]; then
            echo "✅ Coverage data found"
            # Extract line coverage percentage from SimpleCov JSON format
            LINE_COVERAGE=$(ruby -rjson -e "
              data = JSON.parse(File.read('coverage/coverage.json'))
              if data['metrics'] && data['metrics']['covered_percent']
                puts data['metrics']['covered_percent'].round(0)
              else
                puts '0'
              end
            ")

            echo "Line coverage: ${LINE_COVERAGE}%"

            # Determine badge color based on coverage
            if [ "$LINE_COVERAGE" -ge 90 ]; then
              COLOR="brightgreen"
            elif [ "$LINE_COVERAGE" -ge 80 ]; then
              COLOR="green"
            elif [ "$LINE_COVERAGE" -ge 70 ]; then
              COLOR="yellowgreen"
            elif [ "$LINE_COVERAGE" -ge 60 ]; then
              COLOR="yellow"
            else
              COLOR="red"
            fi

            # Create badge URL
            BADGE_URL="https://img.shields.io/badge/coverage-${LINE_COVERAGE}%25-${COLOR}?style=flat-square"

            # Update README.md with the new badge
            if grep -q "coverage.*%" README.md; then
              # Replace existing coverage badge
              sed -i "s|!\[coverage\].*|![coverage]($BADGE_URL)|" README.md
              echo "Updated existing coverage badge in README.md"
            else
              # Add new coverage badge after CI badge
              sed -i "/!\[CI Status\]/a\\\n![coverage]($BADGE_URL)" README.md
              echo "Added coverage badge to README.md"
            fi

            # Stage and commit the changes
            git add README.md
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "docs: update coverage badge [skip ci]"
              git push --set-upstream origin "$BRANCH_NAME"
              echo "Coverage badge updated and pushed"
            fi
          else
            echo "❌ Coverage data not found"
            echo "Available files in coverage directory:"
            ls -la coverage/ || echo "Coverage directory does not exist"
            echo "This usually means the CI workflow didn't generate coverage data or the artifact name mismatch"
            exit 1
          fi

      - name: All checks passed
        run: echo "🎉 All CI checks passed successfully!"
