name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: RuboCop (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache system dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/apt
            ~/.cache/pip
          key: ${{ runner.os }}-system-deps-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-system-deps-

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Create cache directories
        run: |
          mkdir -p .rubocop_cache/
          mkdir -p tmp/cache/

      - name: Lint code
        run: bin/rubocop -f github

      - name: Cache RuboCop results
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            .rubocop_cache/
            tmp/cache/
          key: ${{ runner.os }}-rubocop-${{ hashFiles('**/Gemfile.lock') }}-${{ hashFiles('**/.rubocop.yml') }}
          restore-keys: |
            ${{ runner.os }}-rubocop-${{ hashFiles('**/Gemfile.lock') }}-
            ${{ runner.os }}-rubocop-

  security:
    name: Brakeman (security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache system dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/apt
            ~/.cache/pip
          key: ${{ runner.os }}-system-deps-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-system-deps-

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Create cache directories
        run: |
          mkdir -p .brakeman/
          mkdir -p tmp/cache/

      - name: Static security scan
        run: bin/brakeman --no-pager

      - name: Cache Brakeman results
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            .brakeman/
            tmp/cache/
          key: ${{ runner.os }}-brakeman-${{ hashFiles('**/Gemfile.lock') }}-${{ hashFiles('**/config/**/*') }}
          restore-keys: |
            ${{ runner.os }}-brakeman-${{ hashFiles('**/Gemfile.lock') }}-
            ${{ runner.os }}-brakeman-

