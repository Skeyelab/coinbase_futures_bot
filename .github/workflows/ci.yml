name: CI

on:
  pull_request:
    branches: [ main, feat/** ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

# Force workflow refresh - v20250127-1745
# This is a completely new workflow file to force cache refresh
# UNIQUE_CACHE_BREAKER_ID: WORKFLOW_REFRESH_ATTEMPT_4_1745

env:
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/coinbase_futures_bot_test

jobs:
  lint:
    name: StandardRB (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Lint code
        run: bin/standardrb

  security:
    name: Brakeman (security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Static security scan
        run: bin/brakeman --no-pager

  test:
    name: Rails tests
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev pkg-config

      - name: Cache test database and artifacts
        uses: actions/cache@v4
        with:
          path: |
            tmp/
            .rspec_status
            spec/fixtures/vcr_cassettes/
          key: ${{ runner.os }}-test-cache-${{ hashFiles('db/**/*', 'spec/**/*', 'Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-cache-${{ hashFiles('Gemfile.lock') }}
            ${{ runner.os }}-test-cache-

      - name: Prepare database (create + migrate)
        run: |
          # Ensure proper database setup for real testing
          bin/rails db:create
          bin/rails db:migrate
          bin/rails db:test:prepare
          echo "Database setup complete"

      - name: Debug environment
        run: |
          echo "=== WORKFLOW CACHE TEST - If you see this, cache is refreshed! ==="
          echo "Current timestamp: $(date +%s)"
          echo "Workflow file hash: $(sha256sum .github/workflows/ci.yml | cut -d' ' -f1)"
          echo "=== Environment Debug Info ==="
          echo "RAILS_ENV: $RAILS_ENV"
          echo "DATABASE_URL: $DATABASE_URL"
          echo "BUNDLE_GEMFILE: $BUNDLE_GEMFILE"
          echo "GEM_HOME: $GEM_HOME"
          echo "PATH: $PATH"
          echo "Current working directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Rails version:"
          bin/rails --version
          echo "Database status:"
          bin/rails db:version
          echo "=== End Environment Debug ==="

      - name: Run tests with enhanced debugging
        timeout-minutes: 15
        run: |
          # Disable 'exit on error' for this block; we'll control exit codes manually
          set +e
          echo "=== STARTING TEST SUITE WITH ENHANCED DEBUGGING ==="
          echo "Database URL: $DATABASE_URL"
          echo "Rails env: $RAILS_ENV"
          echo "Current directory: $(pwd)"
          echo "Ruby version: $(ruby --version)"
          echo "Bundle version: $(bundle --version)"

          # Force fresh database setup - no caching shortcuts
          echo "=== FORCING FRESH TEST ENVIRONMENT ==="
          bin/rails db:drop db:create db:migrate RAILS_ENV=test

          # Verify test environment is real
          echo "=== TEST ENVIRONMENT VERIFICATION ==="
          echo "Rails environment: $RAILS_ENV"
          echo "Database URL: $DATABASE_URL"
          echo "Test files found: $(find spec -name '*_spec.rb' | wc -l)"

          # Verify test effectiveness validation is loaded
          echo "=== TEST EFFECTIVENESS VERIFICATION ==="
          bundle exec rails runner "
            puts 'RSpec configuration loaded: ' + defined?(RSpec).to_s
            puts 'Test effectiveness loaded: ' + defined?(TestEffectiveness).to_s
            puts 'Rails helper loaded: ' + File.exist?('spec/rails_helper.rb').to_s
          "

          # Verify database connectivity
          echo "=== DATABASE VERIFICATION ==="
          bundle exec rails runner "
            puts 'Database connected: ' + ActiveRecord::Base.connected?.to_s
            puts 'Database name: ' + ActiveRecord::Base.connection.current_database
            puts 'Tables exist: ' + ActiveRecord::Base.connection.tables.include?('positions').to_s
          "

          # Verify we can perform real database operations
          echo "=== REAL DATABASE OPERATION VERIFICATION ==="
          bundle exec rails runner "
            puts 'Creating test position to verify real database operations...'
            pos = Position.create!(
              product_id: 'TEST-USD',
              side: 'LONG',
              size: 1.0,
              entry_price: 100.0,
              entry_time: Time.current,
              status: 'OPEN',
              day_trading: true
            )
            puts 'Position created with ID: ' + pos.id.to_s
            puts 'Position persisted: ' + pos.persisted?.to_s
            puts 'Position count: ' + Position.count.to_s
            pos.destroy
            puts 'Test position cleaned up'
          "

          echo "=== ENVIRONMENT VARIABLES ==="
          env | grep -E "(DATABASE|RAILS|BUNDLE|PATH)" | sort
          echo "=== CHECKING DATABASE CONNECTION ==="
          bin/rails db:version

          # Run tests with explicit configuration - no shortcuts
          echo "=== RUNNING ACTUAL TESTS ==="
          echo "Using single-process rspec to ensure real execution"
          set -x  # Enable command tracing
          RAILS_ENV=test bundle exec rspec \
            --format progress \
            --backtrace \
            --require rails_helper
          TEST_EXIT_CODE=$?
          set +x  # Disable command tracing

          echo "=== TEST RESULTS ==="
          echo "Test exit code: $TEST_EXIT_CODE"
          echo "Tests completed"

          # Check for any background processes or cleanup issues
          echo "=== CHECKING FOR BACKGROUND PROCESSES ==="
          ps aux | grep -E "(ruby|rspec|rails)" | grep -v grep || echo "No Ruby processes found"
          echo "=== CHECKING FOR DATABASE CONNECTIONS ==="
          bin/rails db:version 2>/dev/null && echo "Database still accessible" || echo "Database connection closed"
          echo "=== CHECKING FOR FILE DESCRIPTORS ==="
          lsof -p $$ 2>/dev/null | wc -l || echo "lsof not available"

          # Check if there were any errors in the test output
          echo "=== CHECKING FOR ERRORS IN TEST OUTPUT ==="
          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "❌ Tests failed with exit code $TEST_EXIT_CODE"
            exit $TEST_EXIT_CODE
          else
            echo "✅ Tests passed successfully"
            exit 0
          fi
        env:
          # Use VCR cassettes in CI but ensure real database testing
          VCR_RECORD_MODE: none
          CI: true
          # COVERAGE: true  # Disabled to avoid SimpleCov processing errors

      # Coverage reports generated locally in coverage/ directory
      # No external uploads configured

  # Optional: Add a job that runs only when tests pass
  success:
    name: Success
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: always() && needs.lint.result == 'success' && needs.security.result == 'success' && needs.test.result == 'success'
    steps:
      - name: All checks passed
        run: echo "🎉 All CI checks passed successfully!"
