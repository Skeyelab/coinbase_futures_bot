name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  RAILS_ENV: test
  RAILS_SKIP_DB_PREPARE: '1'
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/coinbase_futures_bot_test

jobs:
  lint:
    name: StandardRB (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Lint code
        run: bin/standardrb

  security:
    name: Brakeman (security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Static security scan
        run: bin/brakeman --no-pager

  test:
    name: Rails tests
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev pkg-config

      - name: Cache test database and artifacts
        uses: actions/cache@v4
        with:
          path: |
            tmp/
            .rspec_status
            coverage/
            spec/fixtures/vcr_cassettes/
          key: ${{ runner.os }}-test-cache-${{ hashFiles('db/**/*', 'spec/**/*', 'Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-cache-${{ hashFiles('Gemfile.lock') }}
            ${{ runner.os }}-test-cache-

      - name: Prepare database (create + migrate)
        run: |
          # Use cached schema if available, create fresh if needed
          bin/rails db:create db:migrate db:test:prepare

      - name: Run tests
        timeout-minutes: 10
        run: |
          set -e  # Exit on any error
          echo "Starting test suite..."
          bundle exec rspec --verbose --format documentation --backtrace
          echo "Test suite completed with exit code: $?"
        env:
          # Ensure VCR uses cached cassettes in CI
          VCR_RECORD_MODE: none
          CI: true

  # Optional: Add a job that runs only when tests pass
  success:
    name: Success
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: always() && needs.lint.result == 'success' && needs.security.result == 'success' && needs.test.result == 'success'
    steps:
      - name: All checks passed
        run: echo "🎉 All CI checks passed successfully!"
