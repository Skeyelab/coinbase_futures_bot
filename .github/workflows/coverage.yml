name: Coverage

on:
  pull_request:
    branches: [ main, feat/** ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

env:
  RAILS_ENV: test
  COVERAGE: true

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    # No dependencies - runs independently

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev pkg-config postgresql-client

      - name: Setup database
        run: |
          echo "Waiting for PostgreSQL service to be ready..."
          # Wait for PostgreSQL to be fully ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "PostgreSQL not ready yet, waiting..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

          echo "Setting up database..."
          bin/rails db:create
          bin/rails db:migrate
          bin/rails db:test:prepare
          echo "Database setup complete"

      - name: Run tests with coverage
        run: |
          echo "Running tests with SimpleCov coverage..."
          bundle exec rspec --format progress

          echo "Coverage files generated:"
          ls -la coverage/

      - name: Generate coverage report
        run: |
          echo "=== COVERAGE SUMMARY ==="

          if [ -f "coverage/.resultset.json" ]; then
            # Extract and display coverage statistics
            ruby -rjson -e "
              data = JSON.parse(File.read('coverage/.resultset.json'))
              if data['RSpec']
                puts 'Coverage Report:'
                puts '================'

                # Line coverage
                line_coverage = data['RSpec']['coverage'].values.map { |v| v['lines'] }.flatten.compact
                covered_lines = line_coverage.count { |v| v && v > 0 }
                total_lines = line_coverage.count { |v| v }
                line_percentage = total_lines > 0 ? (covered_lines.to_f / total_lines * 100).round(2) : 0

                puts \"Line Coverage: #{covered_lines}/#{total_lines} (#{line_percentage}%)\"

                # Branch coverage
                branch_coverage = data['RSpec']['coverage'].values.map { |v| v['branches'] }.flatten.compact
                covered_branches = branch_coverage.count { |v| v && v > 0 }
                total_branches = branch_coverage.count { |v| v }
                branch_percentage = total_branches > 0 ? (covered_branches.to_f / total_branches * 100).round(2) : 0

                puts \"Branch Coverage: #{covered_branches}/#{total_branches} (#{branch_percentage}%)\"

                # File coverage
                file_coverage = data['RSpec']['coverage'].keys
                puts \"Files Covered: #{file_coverage.length}\"

                # Check thresholds
                line_threshold = 90.0
                branch_threshold = 80.0

                puts \"\\nThresholds:\"
                puts \"Line Coverage: #{line_percentage >= line_threshold ? '✅' : '❌'} #{line_percentage}% (>= #{line_threshold}%)\"
                puts \"Branch Coverage: #{branch_percentage >= branch_threshold ? '✅' : '❌'} #{branch_percentage}% (>= #{branch_threshold}%)\"

                # Exit with error if thresholds not met
                if line_percentage < line_threshold || branch_percentage < branch_threshold
                  puts \"\\n❌ Coverage thresholds not met!\"
                  exit 1
                else
                  puts \"\\n🎉 All coverage thresholds met!\"
                end
              else
                puts 'No coverage data found'
                exit 1
              end
            "
          else
            echo "❌ Coverage file not found"
            exit 1
          fi

      - name: Check coverage thresholds
        if: success()
        run: |
          echo "=== COVERAGE THRESHOLD CHECK ==="

          if [ -f "coverage/.resultset.json" ]; then
            echo "Coverage data found, checking thresholds..."

            # Extract line coverage percentage from JSON
            LINE_COVERAGE=$(ruby -rjson -e "
              data = JSON.parse(File.read('coverage/.resultset.json'))
              if data['RSpec'] && data['RSpec']['coverage']
                line_coverage = data['RSpec']['coverage'].values.map { |v| v['lines'] }.flatten.compact
                covered = line_coverage.count { |v| v && v > 0 }
                total = line_coverage.count { |v| v }
                percentage = total > 0 ? (covered.to_f / total * 100).round(2) : 0
                puts percentage
              else
                puts '0'
              end
            ")

            # Extract branch coverage percentage from JSON (handle different structure)
            BRANCH_COVERAGE=$(ruby -rjson -e "
              data = JSON.parse(File.read('coverage/.resultset.json'))
              if data['RSpec'] && data['RSpec']['coverage']
                # Branch coverage structure is different - it's nested under each file
                total_branches = 0
                covered_branches = 0

                data['RSpec']['coverage'].each do |file_path, coverage_data|
                  if coverage_data['branches']
                    coverage_data['branches'].each do |branch_id, branch_data|
                      total_branches += 1
                      if branch_data && branch_data.is_a?(Array) && branch_data.any? { |v| v && v > 0 }
                        covered_branches += 1
                      end
                    end
                  end
                end

                percentage = total_branches > 0 ? (covered_branches.to_f / total_branches * 100).round(2) : 0
                puts percentage
              else
                puts '0'
              end
            ")

            echo "Line coverage: ${LINE_COVERAGE}% (threshold: 50%)"
            echo "Branch coverage: ${BRANCH_COVERAGE}% (threshold: 25%)"

            # Check if thresholds are met (using realistic thresholds for current coverage)
            if (( $(echo "$LINE_COVERAGE >= 50" | bc -l) )); then
              echo "✅ Line coverage threshold met"
            else
              echo "⚠️  Line coverage below threshold (50%) - Consider improving test coverage"
              # Don't fail the build, just warn
            fi

            if (( $(echo "$BRANCH_COVERAGE >= 25" | bc -l) )); then
              echo "✅ Branch coverage threshold met"
            else
              echo "⚠️  Branch coverage below threshold (25%) - Consider improving test coverage"
              # Don't fail the build, just warn
            fi

            echo "📊 Coverage report generated successfully!"
            echo "💡 To improve coverage:"
            echo "   - Add tests for untested methods and branches"
            echo "   - Use SimpleCov locally: rake coverage:run"
            echo "   - Review coverage report: coverage/index.html"
          else
            echo "❌ Coverage data not found"
            exit 1
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            coverage/
            coverage/.resultset.json
            coverage/index.html
          retention-days: 90

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            try {
              const coverageData = JSON.parse(fs.readFileSync('coverage/.resultset.json', 'utf8'));

              if (coverageData.RSpec) {
                const lineCoverage = coverageData.RSpec.coverage;
                const lineValues = Object.values(lineCoverage).map(v => v.lines).flat().filter(v => v !== null);
                const coveredLines = lineValues.filter(v => v > 0).length;
                const totalLines = lineValues.length;
                const linePercentage = totalLines > 0 ? Math.round((coveredLines / totalLines) * 10000) / 100 : 0;

                const branchValues = Object.values(lineCoverage).map(v => v.branches).flat().filter(v => v !== null);
                const coveredBranches = branchValues.filter(v => v > 0).length;
                const totalBranches = branchValues.length;
                const branchPercentage = totalBranches > 0 ? Math.round((coveredBranches / totalBranches) * 10000) / 100 : 0;

                const comment = `## 📊 Coverage Report

                **Line Coverage:** ${coveredLines}/${totalLines} (${linePercentage}%)
                **Branch Coverage:** ${coveredBranches}/${totalBranches} (${branchPercentage}%)

                **Thresholds:**
                - Line Coverage: ${linePercentage >= 90 ? '✅' : '❌'} ${linePercentage}% (>= 90%)
                - Branch Coverage: ${branchPercentage >= 80 ? '✅' : '❌'} ${branchPercentage}% (>= 80%)

                ${linePercentage >= 90 && branchPercentage >= 80 ? '🎉 All coverage thresholds met!' : '⚠️ Some coverage thresholds not met.'}

                Coverage reports are available as workflow artifacts.`;

                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not generate coverage comment:', error.message);
            }
