name: Update Coverage Badge

on:
  workflow_run:
    workflows: ["Coverage"]
    types:
      - completed

jobs:
  update-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports-${{ github.event.workflow_run.run_number }}
          path: coverage/

      - name: Generate coverage badge
        run: |
          if [ -f "coverage/.resultset.json" ]; then
            # Extract line coverage percentage
            LINE_COVERAGE=$(ruby -rjson -e "
              data = JSON.parse(File.read('coverage/.resultset.json'))
              if data['RSpec']
                line_coverage = data['RSpec']['coverage'].values.map { |v| v['lines'] }.flatten.compact
                covered = line_coverage.count { |v| v && v > 0 }
                total = line_coverage.count { |v| v }
                percentage = total > 0 ? (covered.to_f / total * 100).round(0) : 0
                puts percentage
              else
                puts '0'
              end
            ")
            
            echo "Line coverage: ${LINE_COVERAGE}%"
            
            # Determine badge color based on coverage
            if [ "$LINE_COVERAGE" -ge 90 ]; then
              COLOR="brightgreen"
            elif [ "$LINE_COVERAGE" -ge 80 ]; then
              COLOR="green"
            elif [ "$LINE_COVERAGE" -ge 70 ]; then
              COLOR="yellow"
            elif [ "$LINE_COVERAGE" -ge 60 ]; then
              COLOR="orange"
            else
              COLOR="red"
            fi
            
            # Generate badge URL
            BADGE_URL="https://img.shields.io/badge/coverage-${LINE_COVERAGE}%25-${COLOR}?style=flat-square"
            
            echo "Badge URL: $BADGE_URL"
            
            # Update README.md with badge
            if [ -f "README.md" ]; then
              # Check if badge already exists
              if grep -q "coverage.*%" README.md; then
                # Replace existing badge
                sed -i "s|!\[coverage\].*|![coverage]($BADGE_URL)|" README.md
                echo "Updated existing coverage badge in README.md"
              else
                # Add badge after the first heading
                sed -i "1a\\\n![coverage]($BADGE_URL)\\n" README.md
                echo "Added coverage badge to README.md"
              fi
            fi
          else
            echo "Coverage file not found"
            exit 1
          fi

      - name: Commit badge update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update coverage badge [skip ci]"
          git push
