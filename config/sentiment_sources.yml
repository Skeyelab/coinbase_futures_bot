# Sentiment source and symbol registry.
#
# Adding a tradable symbol or a news feed here is a config change — no code
# edits across the tagging, scoring, and aggregation layers.
#
#   symbols.<SYMBOL>.keywords : words that tag an article with this symbol
#   symbols.<SYMBOL>.lexicon  : which scoring lexicon to use (see SimpleLexiconScorer)
#   sources.<name>.client     : "rss" (GenericRssClient) or a built-in client key
#   sources.<name>.url        : feed URL (rss clients)
#   sources.<name>.symbols    : symbols this source is allowed to tag (scope)
#   sources.<name>.weight     : relative trust when aggregating (default 1.0)

symbols:
  BTC-USD:
    keywords: [BTC, BITCOIN]
    lexicon: crypto
  ETH-USD:
    keywords: [ETH, ETHEREUM]
    lexicon: crypto
  OIL-USD:
    # Commodity terms + high-signal geopolitical/supply-disruption terms (issue
    # #431) so oil catalysts that never say "oil/crude" (Hormuz, Houthi, Red Sea,
    # sanctions, Iran) still route to OIL-USD. Deliberately omits low-precision
    # terms (bare "war"/"strike"/"Israel") that false-positive off oil. Sources
    # are oil-scoped, so recall gains here don't leak into other symbols.
    keywords: [OIL, CRUDE, WTI, BRENT, OPEC, PETROLEUM, BARREL,
      HORMUZ, HOUTHI, "RED SEA", TANKER, REFINERY, PIPELINE,
      SANCTIONS, SANCTION, EMBARGO, IRAN, SAUDI, "SUPPLY DISRUPTION"]
    lexicon: oil

sources:
  cryptopanic:
    client: cryptopanic
    symbols: [BTC-USD, ETH-USD]
    weight: 1.0
  coindesk_rss:
    client: coindesk
    symbols: [BTC-USD, ETH-USD]
    weight: 1.0
  cointelegraph_rss:
    client: cointelegraph
    symbols: [BTC-USD, ETH-USD]
    weight: 1.0
  oilprice_rss:
    client: rss
    url: https://oilprice.com/rss/main
    symbols: [OIL-USD]
    weight: 1.0
  # Additional energy-news source (issue #431) to raise oil inflow beyond the
  # existing feeds. Validated 200/valid-RSS 2026-07-23.
  rigzone_rss:
    client: rss
    url: https://www.rigzone.com/news/rss/rigzone_latest.aspx
    symbols: [OIL-USD]
    weight: 0.8
  investing_commodities_rss:
    client: rss
    url: https://www.investing.com/rss/news_11.rss
    symbols: [OIL-USD]
    weight: 0.7
  eia_today_in_energy_rss:
    client: rss
    url: https://www.eia.gov/rss/todayinenergy.xml
    symbols: [OIL-USD]
    weight: 1.0
  # Numeric fundamental (weekly crude build/draw), built explicitly by
  # EiaInventoryClient — not an rss feed. Needs ENV["EIA_API_KEY"].
  eia_inventory:
    client: eia
    symbols: [OIL-USD]
    weight: 1.5
